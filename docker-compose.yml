services:
  db:
    image: postgres:16-alpine
    container_name: hookbridge_db
    environment:
      POSTGRES_USER: hbuser
      POSTGRES_PASSWORD: hbpass
      POSTGRES_DB: hookbridge
    ports:
      - "5437:5432"
    volumes:
      - ./receiver/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hbuser -d hookbridge"]
      interval: 5s
      timeout: 3s
      retries: 10

  classifier:
    build:
      context: .
      dockerfile: docker/Dockerfile.classifier
    container_name: hookbridge_classifier
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "ruby -e \"require 'net/http'; exit(Net::HTTP.get_response(URI('http://localhost:5000/health')).code == '200' ? 0 : 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10

  receiver:
    build:
      context: .
      dockerfile: docker/Dockerfile.receiver
    container_name: hookbridge_receiver
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy

  processor:
    build:
      context: .
      dockerfile: docker/Dockerfile.processor
    container_name: hookbridge_processor
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      classifier:
        condition: service_healthy
    restart: on-failure
